name: event_ticketing
description: "Wisuda Event Ticketing"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.0

dependencies:
  collection: ^1.19.1
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  hive: ^2.2.3
  hive_flutter:
  http: ^1.3.0
  intl: ^0.19.0
  mobile_scanner: ^7.2.0
  path_provider: ^2.1.5
  provider: ^6.1.2
  qr_flutter: ^4.1.0
  share_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator:
  build_runner:
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    
flutter_launcher_icons:
  macos:
    generate: true
    image_path: "assets/images/app_iconv2.png"
